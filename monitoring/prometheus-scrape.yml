# Prometheus scrape configuration snippet for local development
# Add this to your prometheus.yml under `scrape_configs:` or include via file_sd_configs
scrape_configs:
  - job_name: 'streamer'
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8080']
        labels:
          service: streamer
