name: Pytest with Artifacts

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  pytest:
    name: Run pytest and upload logs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f apps/ml-engine/requirements.txt ]; then pip install -r apps/ml-engine/requirements.txt; fi

      - name: Run pytest (save logs per-file)
        run: |
          mkdir -p apps/ml-engine/test_logs
          # Run pytest and capture verbose output to a single log and junit
          pytest -q apps/ml-engine/tests --junitxml=apps/ml-engine/test_logs/junit.xml | tee apps/ml-engine/test_logs/pytest.log

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        with:
          name: ml-engine-test-logs
          path: apps/ml-engine/test_logs
