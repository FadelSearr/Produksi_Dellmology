name: CI - ML smoke test

on:
  push:
    paths:
      - 'apps/ml-engine/**'
  pull_request:
    paths:
      - 'apps/ml-engine/**'

jobs:
  ml-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install minimal deps
        run: python -m pip install --upgrade pip && pip install numpy
      - name: Generate/train model (train if TF present, else stub)
        run: |
          python apps/ml-engine/train_or_stub.py --output-dir apps/ml-engine --epochs 1 --samples 8
      - name: Start inference server
        run: |
          python apps/ml-engine/inference_server.py &
          sleep 2
      - name: Smoke /infer
        run: |
          curl --fail --silent http://127.0.0.1:5000/infer?symbol=BBCA | jq -r '.' || (cat /dev/null)

  ml-train-tf:
    name: ML - Train with TensorFlow (CI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Upgrade pip and install TF (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install numpy h5py tensorflow==2.12.0
      - name: Train model with TensorFlow
        run: |
          python apps/ml-engine/train_or_stub.py --output-dir apps/ml-engine --epochs 1 --samples 32
      - name: List generated files
        run: ls -la apps/ml-engine || true
      - name: Start inference server
        run: |
          python apps/ml-engine/inference_server.py &
          sleep 4
      - name: Smoke /infer
        run: |
          curl --fail --silent http://127.0.0.1:5000/infer?symbol=BBCA || (cat /dev/null)
      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: toy_cnn_h5
          path: apps/ml-engine/toy_cnn.h5

  ml-eval:
    name: ML - Train and Eval (metrics)
    runs-on: ubuntu-latest
    needs: ml-smoke
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install minimal deps
        run: python -m pip install --upgrade pip && pip install numpy
      - name: Run train_and_eval (produces model_metrics.json)
        run: |
          python apps/ml-engine/train_and_eval.py
      - name: Upload model metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: model_metrics
          path: apps/ml-engine/model_metrics.json
      # Optional: to publish metrics to dashboard, configure a separate deployment step.
