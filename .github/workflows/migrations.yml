name: CI - Migrations

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  run-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: dellmology
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin -d dellmology" --health-interval=5s --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f apps/ml-engine/requirements.txt ]; then python -m pip install -r apps/ml-engine/requirements.txt; fi

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres to be ready..."
          for i in {1..20}; do
            pg_isready -U admin -d dellmology && break || sleep 3
          done

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5432/dellmology
        run: |
          python apps/ml-engine/scripts/run_migrations.py

      - name: Upload migration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-logs
          path: |
            apps/ml-engine/logs/**
