name: Supabase E2E (conditional)

on:
  workflow_dispatch: {}
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  supabase-e2e:
    if: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "apps/ml-engine/requirements.txt" ]; then pip install -r apps/ml-engine/requirements.txt; fi

      - name: Run Supabase-marked tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Running pytest for tests marked 'supabase'"
          python -m pytest -q -m supabase apps/ml-engine/tests || true

      - name: Upload pytest junit (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: .pytest_cache || ''
