name: Migrations Smoke Test

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  migrations-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug: list scripts
        run: |
          echo "Workspace files:" && ls -la
          echo "Scripts dir:" && ls -la apps/ml-engine/scripts || true
          echo "Show smoke script (if present):" && cat apps/ml-engine/scripts/smoke_insert_evaluation.py || true

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Start test DB stack
        run: |
          docker compose -f apps/ml-engine/docker-compose.test-db.yml up -d

      - name: Debug: docker status and container logs
        run: |
          echo "Docker ps -a:" && docker ps -a
          echo "Docker compose ps:" && docker compose -f apps/ml-engine/docker-compose.test-db.yml ps || true
          echo "TimescaleDB logs (last 200 lines):" && docker logs --tail 200 idx_test_timescaledb || true
          echo "pg_isready check:" && docker exec idx_test_timescaledb pg_isready -U admin -d dellmology || true

      - name: Wait for Postgres to be ready
        run: |
          for i in $(seq 1 30); do
            docker exec idx_test_timescaledb pg_isready -U admin -d dellmology && break || sleep 2
          done

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/ml-engine/requirements.txt

      - name: Debug: python environment
        run: |
          python --version
          pip --version
          pip show sqlalchemy || true
          python -c "import sys; print('sys.path:', sys.path[:5])" || true
          python -c "import sqlalchemy, psycopg2; print('imports OK')" || true

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5433/dellmology
        run: |
          python apps/ml-engine/scripts/run_migrations.py 2>&1 | tee run_migrations.log

      - name: Upload migrations log
        uses: actions/upload-artifact@v4
        with:
          name: run_migrations.log
          path: run_migrations.log

      - name: Run smoke insert (script or inline fallback)
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5433/dellmology
        run: |
          if [ -f apps/ml-engine/scripts/smoke_insert_evaluation.py ]; then
            python apps/ml-engine/scripts/smoke_insert_evaluation.py 2>&1 | tee smoke_insert.log
          else
            echo "smoke_insert_evaluation.py not found — running inline fallback"
            python - <<'PY' 2>&1 | tee smoke_insert.log
import os
from sqlalchemy import create_engine, text

db_url = os.getenv('DATABASE_URL') or 'postgresql://admin:password@localhost:5433/dellmology'
engine = create_engine(db_url)
sample = {
    'name': 'challenger_test',
    'champ': 'champion_v1',
    'challenger': 'challenger_test',
    'metrics': '{"net_return": 0.12, "trades": 42}',
    'passed': True,
}
with engine.begin() as conn:
    conn.execute(text(
        "INSERT INTO public.ml_model_evaluations (model_name, champion, challenger, metrics, passed) VALUES (:name, :champ, :challenger, CAST(:metrics AS jsonb), :passed)"
    ), sample)
print('Inserted sample evaluation (inline)')
PY
          fi

      - name: Upload smoke insert log
        uses: actions/upload-artifact@v4
        with:
          name: smoke_insert.log
          path: smoke_insert.log

      - name: Tear down
        if: always()
        run: |
          docker compose -f apps/ml-engine/docker-compose.test-db.yml down
