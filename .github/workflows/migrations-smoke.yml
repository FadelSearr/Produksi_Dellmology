name: Migrations Smoke Test

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  migrations-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Start test DB stack
        run: |
          docker compose -f apps/ml-engine/docker-compose.test-db.yml up -d

      - name: Wait for Postgres to be ready
        run: |
          for i in $(seq 1 30); do
            docker exec idx_test_timescaledb pg_isready -U admin -d dellmology && break || sleep 2
          done

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/ml-engine/requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5433/dellmology
        run: |
          python apps/ml-engine/scripts/run_migrations.py

      - name: Run smoke insert
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5433/dellmology
        run: |
          python apps/ml-engine/scripts/smoke_insert_evaluation.py

      - name: Tear down
        if: always()
        run: |
          docker compose -f apps/ml-engine/docker-compose.test-db.yml down
