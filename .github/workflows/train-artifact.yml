name: Build ML Model Artifact

on:
  workflow_dispatch:

jobs:
  train-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Run synthetic trainer
        run: |
          python apps/ml-engine/train_cnn.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml-model-artifacts
          path: artifacts/models/*.npz
