name: TimescaleDB E2E (migrations + RLS)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

jobs:
  timescaledb-e2e:
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg14
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: dellmology
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin -d dellmology" --health-interval=5s --health-timeout=5s --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f apps/ml-engine/requirements.txt ]; then pip install -r apps/ml-engine/requirements.txt; fi
          pip install psycopg2-binary

      - name: Wait for TimescaleDB
        run: |
          echo "Waiting for TimescaleDB to be ready..."
          for i in {1..30}; do
            pg_isready -U admin -d dellmology && break || sleep 3
          done

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5432/dellmology
        run: |
          echo "Running migrations against TimescaleDB"
          python apps/ml-engine/scripts/run_migrations.py

      - name: Run RLS checker
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5432/dellmology
        run: |
          echo "Running RLS checker"
          python apps/ml-engine/scripts/check_supabase_rls.py || true

      - name: Run supabase-marked tests
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5432/dellmology
        run: |
          echo "Running pytest for tests marked 'supabase'"
          python -m pytest -q -m supabase apps/ml-engine/tests || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timescaledb-e2e-logs
          path: |
            apps/ml-engine/logs/**
            .pytest_cache || ''
