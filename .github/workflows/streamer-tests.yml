name: Streamer CI - Tests

on:
  push:
    paths:
      - 'apps/streamer/**'
      - 'db/init/**'
  pull_request:
    paths:
      - 'apps/streamer/**'
      - 'db/init/**'

jobs:
  tests:
    name: Run streamer unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check DB migrations exist and include trades table
        run: |
          echo "Checking db/init for trades table creation..."
          # allow optional IF NOT EXISTS or other clauses between CREATE TABLE and the table name
          if ! grep -Eiq "CREATE TABLE\s+(IF NOT EXISTS\s+)?trades\b" db/init/*.sql; then
            echo "ERROR: 'trades' table creation not found in db/init/*.sql"
            echo "List files:"; ls -la db/init || true
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          check-latest: true

      - name: Download modules
        working-directory: apps/streamer
        run: go mod download

      - name: Run tests
        working-directory: apps/streamer
        run: go test ./... -v
