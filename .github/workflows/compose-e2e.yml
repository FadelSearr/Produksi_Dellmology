name: Docker Compose E2E

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  compose-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Start test DB (TimescaleDB)
        run: |
          docker compose -f apps/ml-engine/docker-compose.test-db.yml up -d

      - name: Wait for TimescaleDB
        run: |
          echo "Waiting for TimescaleDB to become healthy..."
          set -e
          READY=0
          for i in $(seq 1 120); do
            if docker compose -f apps/ml-engine/docker-compose.test-db.yml exec -T timescaledb pg_isready -U admin -d dellmology >/dev/null 2>&1; then
              READY=1
              echo "TimescaleDB ready after $i attempts"
              break
            fi
            echo "Waiting for TimescaleDB... ($i/120)"
            sleep 2
          done
          if [ "$READY" -ne 1 ]; then
            echo "Postgres did not become reachable after waiting. Dumping docker logs:"
            docker compose -f apps/ml-engine/docker-compose.test-db.yml logs --no-color || true
            exit 1
          fi

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5433/dellmology
        run: |
          python -m pip install -r apps/ml-engine/requirements.txt
          python apps/ml-engine/scripts/run_migrations.py

      - name: Run ml-engine tests
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5433/dellmology
        run: |
          python -m pip install -r apps/ml-engine/requirements.txt
          python -m pytest apps/ml-engine/tests -q

      - name: Build frontend
        run: |
          cd apps/web
          npm ci
          npm run build

      - name: Tear down
        if: always()
        run: |
          docker compose -f apps/ml-engine/docker-compose.test-db.yml down -v
