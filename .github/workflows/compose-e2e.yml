name: Docker Compose E2E

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  compose-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Start test DB (TimescaleDB)
        run: |
          docker compose -f apps/ml-engine/docker-compose.test-db.yml up -d

      - name: Wait for TimescaleDB
        run: |
          echo "Waiting for TimescaleDB to become healthy..."
          for i in {1..60}; do
            docker compose -f apps/ml-engine/docker-compose.test-db.yml exec -T timescaledb pg_isready -U admin -d dellmology && break || true
            sleep 2
          done

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5433/dellmology
        run: |
          mkdir -p apps/ml-engine/logs
          python -m pip install -r apps/ml-engine/requirements.txt 2>&1 | tee apps/ml-engine/logs/migrations_install.log
          python apps/ml-engine/scripts/run_migrations.py 2>&1 | tee apps/ml-engine/logs/migrations.log

      - name: Run ml-engine tests
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5433/dellmology
        run: |
          mkdir -p apps/ml-engine/logs
          python -m pip install -r apps/ml-engine/requirements.txt 2>&1 | tee apps/ml-engine/logs/pytest_install.log
          set -o pipefail
          python -m pytest apps/ml-engine/tests -q --junitxml=apps/ml-engine/logs/test-results.xml 2>&1 | tee apps/ml-engine/logs/pytest.log
          exit ${PIPESTATUS[0]}

      - name: Build frontend
        run: |
          cd apps/web
          npm ci
          npm run build

      - name: Tear down
        if: always()
        run: |
          docker compose -f apps/ml-engine/docker-compose.test-db.yml down -v
