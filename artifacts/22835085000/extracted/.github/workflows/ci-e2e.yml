name: CI - E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ML engine Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path 'apps/ml-engine/requirements.txt') { python -m pip install -r apps/ml-engine/requirements.txt }

      - name: Run local E2E (PowerShell script)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/run_local_e2e.ps1

      - name: Upload test results (logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            apps/ml-engine/logs/**
            apps/web/.next/**
            ./**/test-results.xml
