name: Migrations Smoke Test

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  migrations-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create early CI marker
        if: always()
        run: |
          echo "early-ci-marker: $(date)" > ci_early.txt

      - name: Upload early CI marker
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci_early_marker
          path: ci_early.txt

      - name: Run CI health check
        run: |
          python apps/ml-engine/scripts/ci_health_check.py 2>&1 | tee ci_health_check.log

      - name: Upload CI health check artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci_health_check
          path: ci_health_check.log

      - name: Debug: git info
        run: |
          echo "Git HEAD:" && git rev-parse HEAD || true
          echo "Current branch:" && git branch --show-current || true
          echo "Git status:" && git status --porcelain || true
          echo "Last commit:" && git log -1 --pretty=fuller || true
          echo "Tracked files (first 200):" && git ls-files | sed -n '1,200p' || true

      - name: Debug: full workspace listing
        run: |
          echo "PWD: $(pwd)"
          echo "Top-level ls:" && ls -la || true
          echo "Recursive ls (first 1000 lines):" && ls -R | sed -n '1,1000p' || true

      - name: Pack workspace
        run: |
          tar -czf workspace.tar.gz . || true

      - name: Upload workspace tarball
        run: |
          echo "workspace.tar.gz exists:" && ls -la workspace.tar.gz || true
        uses: actions/upload-artifact@v4
        with:
          name: workspace.tar.gz
          path: workspace.tar.gz

      - name: Create CI debug marker
        if: always()
        run: |
          echo "CI run: $(date)" > ci_debug.txt
          echo "Runner: $RUNNER_OS $RUNNER_TEMP" >> ci_debug.txt || true
          echo "Top-level listing:" >> ci_debug.txt
          ls -la >> ci_debug.txt || true

      - name: Debug: list scripts
        run: |
          echo "Workspace files:" && ls -la
          echo "Scripts dir:" && ls -la apps/ml-engine/scripts || true
          echo "Show smoke script (if present):" && cat apps/ml-engine/scripts/smoke_insert_evaluation.py || true

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Start test DB stack
        run: |
          docker compose -f apps/ml-engine/docker-compose.test-db.yml up -d

      - name: Debug: docker status and container logs
        run: |
          echo "Docker ps -a:" && docker ps -a
          echo "Docker compose ps:" && docker compose -f apps/ml-engine/docker-compose.test-db.yml ps || true
          echo "TimescaleDB logs (last 200 lines):" && docker logs --tail 200 idx_test_timescaledb || true
          echo "pg_isready check:" && docker exec idx_test_timescaledb pg_isready -U admin -d dellmology || true

      - name: Collect Docker container logs
        if: always()
        run: |
          mkdir -p docker_logs
          # Collect logs from known containers; tolerate missing containers
          for c in $(docker ps -aq); do
            name=$(docker inspect --format='{{.Name}}' $c 2>/dev/null | sed 's#/##') || name=$c
            docker logs --tail 500 $c > docker_logs/${name:-container}_${c}.log 2>&1 || true
          done
          tar -czf docker_logs.tar.gz docker_logs || true


      - name: Wait for Postgres to be ready
        run: |
          for i in $(seq 1 30); do
            docker exec idx_test_timescaledb pg_isready -U admin -d dellmology && break || sleep 2
          done

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/ml-engine/requirements.txt

      - name: Debug: python environment
        run: |
          python --version
          pip --version
          pip show sqlalchemy || true
          python -c "import sys; print('sys.path:', sys.path[:5])" || true
          python -c "import sqlalchemy, psycopg2; print('imports OK')" || true

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5433/dellmology
        run: |
          python apps/ml-engine/scripts/run_migrations.py 2>&1 | tee run_migrations.log

      - name: Run RLS smoke check
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5433/dellmology
        run: |
          if [ -f apps/ml-engine/scripts/rls_smoke_check.py ]; then
            python apps/ml-engine/scripts/rls_smoke_check.py 2>&1 | tee rls_smoke.log || true
          else
            echo "rls_smoke_check.py not found"
          fi

      - name: Upload RLS smoke log
        if: always()
        run: |
          echo "rls_smoke.log listing:" && ls -la rls_smoke.log || true
        uses: actions/upload-artifact@v4
        with:
          name: rls_smoke.log
          path: rls_smoke.log

      - name: Upload docker logs
        if: always()
        run: |
          echo "docker_logs.tar.gz listing:" && ls -la docker_logs.tar.gz || true
        uses: actions/upload-artifact@v4
        with:
          name: docker_logs
          path: docker_logs.tar.gz

      - name: Upload CI debug marker
        if: always()
        run: |
          echo "ci_debug.txt listing:" && ls -la ci_debug.txt || true
        uses: actions/upload-artifact@v4
        with:
          name: ci_debug
          path: ci_debug.txt

      - name: Upload migrations log
        run: |
          echo "run_migrations.log listing:" && ls -la run_migrations.log || true
        uses: actions/upload-artifact@v4
        with:
          name: run_migrations.log
          path: run_migrations.log

      - name: Run smoke insert (script or inline fallback)
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5433/dellmology
        run: |
          if [ -f apps/ml-engine/scripts/smoke_insert_evaluation.py ]; then
            python apps/ml-engine/scripts/smoke_insert_evaluation.py 2>&1 | tee smoke_insert.log
          else
            echo "smoke_insert_evaluation.py not found — running inline fallback"
            python - <<'PY' 2>&1 | tee smoke_insert.log
import os
from sqlalchemy import create_engine, text

db_url = os.getenv('DATABASE_URL') or 'postgresql://admin:password@localhost:5433/dellmology'
engine = create_engine(db_url)
sample = {
    'name': 'challenger_test',
    'champ': 'champion_v1',
    'challenger': 'challenger_test',
    'metrics': '{"net_return": 0.12, "trades": 42}',
    'passed': True,
}
with engine.begin() as conn:
    conn.execute(text(
        "INSERT INTO public.ml_model_evaluations (model_name, champion, challenger, metrics, passed) VALUES (:name, :champ, :challenger, CAST(:metrics AS jsonb), :passed)"
    ), sample)
print('Inserted sample evaluation (inline)')
PY
          fi

      - name: Upload smoke insert log
        run: |
          echo "smoke_insert.log listing:" && ls -la smoke_insert.log || true
        uses: actions/upload-artifact@v3
        with:
          name: smoke_insert.log
          path: smoke_insert.log

      - name: Tear down
        if: always()
        run: |
          docker compose -f apps/ml-engine/docker-compose.test-db.yml down
