name: RLS Smoke Check

on:
  push:
    branches:
      - main
      - feat/**
  workflow_dispatch:

jobs:
  rls-check:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary

      - name: Run RLS checker (requires DATABASE_URL or SUPABASE_* secrets)
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_TEST_DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Running Supabase RLS smoke check"
          python apps/ml-engine/scripts/check_supabase_rls.py || true

      - name: Notice
        run: |
          echo "This workflow is a smoke-check helper: set secrets SUPABASE_TEST_DATABASE_URL or SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY to enable a real check."
